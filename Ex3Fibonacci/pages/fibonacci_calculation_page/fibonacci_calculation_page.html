<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../styles/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../styles/style.css">
    <link rel="stylesheet" href="../../styles/fibonacci_calculation_page.css">
    <title>Cálculo Fibonacci</title>
</head>

<body class="overflow-x-hidden overflow-y-hidden">

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center">

        <!-- Botão Voltar -->
        <button class="btn btn-outline-light fs-2 font-family-weghorst rounded-0 rounded-top-5 px-5 bg-dark-gray"
            onclick='window.location.href="../main_page/index.html"'>
            Voltar
        </button>

        <div class="d-flex flex-column align-items-center justify-content-center p-5 gap-4 
            rounded-5 purple-glow border-color-white bg-dark-gray font-family-oswald">
            <input type="number" class="form-control fs-2 rounded-pill border-color-purple"
                id="input-limitante-sequencia" placeholder="Limitante da sequência">
            <button class="btn btn-outline-purple fs-2 font-family-weghorst rounded-pill px-5 bg-dark-gray"
                id="btn-confirmar">Confirmar</button>
        </div>

        <!-- Área de Resultado -->
        <div class="d-flex bg-dark-gray border-color-white purple-glow rounded-4 mt-4 
            p-5 flex-column justify-content-center align-items-center">
            <div class="d-flex text-center text-white fs-3 font-family-weghorst">
                Resultado
            </div>
            <div class="card-body" style="max-height:300px; overflow-y:auto;">
                <p id="resultado" class="text-white fs-4 text-break text-center mb-0">
                    O resultado aparecerá aqui.
                </p>
            </div>
        </div>
    </div>

    <script src="../../scripts/js/bootstrap.bundle.min.js"></script>
    <script src="../../scripts/fibonacci_calculation_page.js"></script>

</body>
</html>
