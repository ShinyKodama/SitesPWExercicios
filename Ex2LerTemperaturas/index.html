<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title> L.B & E.W | Cadastro Alunos</title>
</head>

<body>
    <div class="d-flex flex-column w-fit justify-content-center align-items-center 
        rounded-4 vh-100 w-100 text-white">
        
        <h1 class="font-family-weghorst display-4 shadow-lg rounded-pill px-3 
            mb-5 bf-blur-5px bf-brightness-1"> — Área de Cadastro — </h1>
        <div class="d-flex flex-column align-items-center justify-content-center p-5 
            g-20px rounded-5 shadow position-relative bg-dark-gray border-color-yellow font-family-oswald">

            <input type="text"   class="form-control fs-2 rounded-4 border-color-yellow"     
                id="input-nome-aluno"          
                placeholder="Nome do(a) aluno(a)">
            <input type="number" class="form-control fs-2 rounded-4 border-color-yellow"      
                id="input-primeira-nota-aluno" 
                placeholder="1° Nota do(a) aluno(a)">
            <input type="number" class="form-control fs-2 mb-5 rounded-4 border-color-yellow" 
                id="input-segunda-nota-aluno"  
                placeholder="2° Nota do(a) aluno(a)">
            
            <button class="btn btn-outline-warning fs-2 font-family-weghorst 
                rounded-4 px-5 bg-dark-gray" id="btn-confirmar"> Confirmar </button>
            
            <button class="btn btn-outline-danger fs-2 font-family-weghorst 
                rounded-4 px-5 bg-dark-gray" id="btn-ir-para-relatorio" disabled> Ir para Relatório </button>           
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
